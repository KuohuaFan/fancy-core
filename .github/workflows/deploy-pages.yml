# 把 public/standalone 的免安裝 Demo 發佈到 GitHub Pages
# 啟用：GitHub repo → Settings → Pages → Build and deployment → Source: GitHub Actions
name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["public/standalone/**", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public/standalone
      - id: deployment
        uses: actions/deploy-pages@v4
